---
# Git hooks for pocket-id-operator, wired to mise tasks.
#
# `mise install` registers these automatically vioa [hooks].
# To bypass once append --no-verify to the git command.
# Everything here will be rerun by the github workflows

pre-commit:
  parallel: true
  skip:
    - merge
    - rebase
  commands:
    gofmt:
      glob: "*.go"
      run: gofmt -w {staged_files}
      stage_fixed: true
    zizmor:
      glob: ".github/**/*.{yml,yaml}"
      run: zizmor --offline {staged_files}

# Once per push: make sure generated files are committed before they hit CI.
pre-push:
  commands:
    # Derived files (CRDs, deepcopy, install.yaml, schemas) must
    # match the API types. Fails if `regen` changes any committed generated file
    generated-up-to-date:
      glob: "{api,config,internal,dist,hack}/**"
      run: mise run verify-generated
    lint-chart:
      glob: "dist/chart/**"
      run: mise run lint-chart

# Keep derived files reconciled after pulling or rebasing in upstream changes,
# so a merge that touches the API types never leaves stale CRDs/schemas behind.
post-merge:
  commands:
    regen:
      run: |-
        mise run regen
        echo "ℹ Ran 'mise run regen' after the merge — check 'git status' and commit any refreshed generated files."

post-rewrite:
  commands:
    regen:
      run: |-
        mise run regen
        echo "ℹ Ran 'mise run regen' after the rebase — check 'git status' and commit any refreshed generated files."
