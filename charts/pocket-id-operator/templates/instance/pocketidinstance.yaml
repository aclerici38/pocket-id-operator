{{- /* Don't render the root instance when the subchart's instance is enabled */}}
{{- $sub := (index .Values "pocket-id-instance") | default dict -}}
{{- $subInstance := $sub.instance | default dict -}}
{{- if and .Values.instance.enabled (not $subInstance.enabled) }}
apiVersion: pocketid.internal/v1alpha1
kind: PocketIDInstance
metadata:
  name: {{ .Values.instance.name | default "pocket-id" }}
  namespace: {{ .Release.Namespace }}
  labels:
    helm.sh/chart: {{ include "chart.chart" . }}
    app.kubernetes.io/name: pocket-id
    app.kubernetes.io/instance: {{ .Values.instance.name | default "pocket-id" }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    {{- with .Values.instance.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.instance.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- with .Values.instance.spec }}
spec:
  {{- toYaml . | nindent 2 }}
{{- end }}
{{- end }}
