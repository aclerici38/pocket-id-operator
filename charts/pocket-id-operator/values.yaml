# yaml-language-server: $schema=./values.schema.json

# Operator deployment configuration
operator:
  # Leader election is enabled
  replicas: 1

  image:
    repository: ghcr.io/aclerici38/pocket-id-operator
    tag: "" # Defaults to Chart.appVersion
    pullPolicy: IfNotPresent

  args:
    - --zap-log-level=info
  env: []

  # Additional labels and annotations applied to the operator Deployment and its pod template
  labels: {}
  annotations: {}

  # Auto-generate logo URLs for OIDC clients from templates (set to false to make it opt-in per client)
  autoGenerateLogos: true

  # timezone sets the TZ env var on the operator container, which determines the
  # local timezone used for clientSecretRotation.window cron expressions.
  # When unset, falls back to instance.spec.timezone; if neither is set the TZ
  # env var is left unset.
  timezone: ""

  # Default URL template for light logos ({{name}} is replaced with the client name)
  # Defaults to the dashboard-icons CDN if not set
  # defaultLogoUrl: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/{{name}}.png"
  # Default URL template for dark logos
  # defaultDarkLogoUrl: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/{{name}}-dark.png"

  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true

  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi

# Operator metrics configuration
# See https://github.com/aclerici38/pocket-id-operator/blob/main/docs/metrics.md
metrics:
  enabled: false
  port: 8080
  serviceMonitor:
    enabled: false
  prometheusRule:
    # Enabled by default when the PrometheusRule CRD is available on the cluster.
    # Set to false to explicitly disable.
    enabled: true
    labels: {}
    # Toggle individual default alerting rules on or off. Each rule defaults to
    # enabled; set enabled: false to omit it from the generated PrometheusRule.
    rules:
      PocketIDInstanceNotReady:
        enabled: true
      PocketIDResourceNotReady:
        enabled: true
      PocketIDAPIHighErrorRate:
        enabled: true
      PocketIDAPISlowRequests:
        enabled: true
      PocketIDExternalDeletions:
        enabled: true
      PocketIDReconcileErrors:
        enabled: true
      PocketIDWorkQueueBackup:
        enabled: true
      PocketIDOIDCClientPKCESupported:
        enabled: true
      PocketIDOIDCClientRotationFailing:
        enabled: true
      PocketIDOIDCClientRotationOverdue:
        enabled: true
      PocketIDOIDCClientRotationWindowMissed:
        enabled: true
      PocketIDOIDCClientRotationDeferrals:
        enabled: true
    # Additional custom alerting rules appended to the default set
    additionalRules: []
  # Setting dashboard.enabled creates a configmap with the dashboard json.
  # When enabled, the GrafanaDashboard CRD is also created automatically
  # if the grafana-operator CRD is available on the cluster.
  # Set grafanaDashboard.enabled to false to explicitly disable it.
  dashboard:
    enabled: false
    labels:
      grafana_dashboard: "1"
    grafanaDashboard:
      enabled: true
      allowCrossNamespaceImport: true
      instanceSelector:
        # Defaults to {grafana.internal/instance: grafana} when left empty.
        matchLabels: {}

# DEPRECATED: the `instance`, `users`, and `userGroups` keys below will be
# removed in a future release. Two migration options:
#   1. In place, no resource recreation: set `instance.enabled: false` here and
#      move your config under the `pocket-id-instance` key at the bottom of this
#      file.
#   2. Separate release: use the standalone pocket-id-instance chart, or apply
#      the PocketID* resources directly.
# https://github.com/aclerici38/pocket-id-operator/tree/main/charts/pocket-id-instance
instance:
  enabled: true
  name: pocket-id
  labels: {}
  annotations: {}
  # ServiceMonitor for the PocketIDInstance (requires metrics.enabled)
  # Nothing useful exposed by pocket-id right now
  # https://github.com/pocket-id/pocket-id/issues/1318
  serviceMonitor:
    enabled: false

  # PocketIDInstance spec — all fields from the CRD are supported here
  # See docs for all available options (SMTP, LDAP, S3, UI, user management, etc.)
  spec:
    encryptionKey:
      # value: "your-encryption-key-here-min-16-bytes"
      # valueFrom:
      #   secretKeyRef:
      #     name: pocket-id-encryption-key
      #     key: encryption-key

    # appUrl: "https://auth.example.com"

# PocketIDUser configuration
# DEPRECATED: use the pocket-id-instance chart (see the note above `instance`).
# Full documentation: https://github.com/aclerici38/pocket-id-operator/blob/main/docs/pocketiduser.md
users: []
  # - name: admin-user
  #   spec:
  #     admin: true
  #     email:
  #       value: "admin@example.com"
  #     firstName:
  #       value: "Admin"

# PocketIDUserGroup configuration
# DEPRECATED: use the pocket-id-instance chart (see the note above `instance`).
# Full documentation: https://github.com/aclerici38/pocket-id-operator/blob/main/docs/pocketidusergroup.md
userGroups: []
  # - name: admins
  #   spec:
  #     friendlyName: "Admins"
  #     users:
  #       userRefs:
  #         - name: admin-user

# Bundled pocket-id-instance subchart — the replacement for the deprecated
# instance/users/userGroups keys above. Disabled by default. To migrate in
# place, set instance.enabled=false above, then enable and configure it here.
# See the pocket-id-instance chart values for the full schema.
pocket-id-instance:
  instance:
    enabled: false
    name: pocket-id
