# yaml-language-server: $schema=./values.schema.json

# Operator deployment configuration
operator:
  # Leader election is enabled
  replicas: 1

  image:
    repository: ghcr.io/aclerici38/pocket-id-operator
    tag: "" # Defaults to Chart.appVersion
    pullPolicy: IfNotPresent

  args:
    - --zap-log-level=info
  env: []

  # Additional labels and annotations applied to the operator Deployment and its pod template
  labels: {}
  annotations: {}

  # Auto-generate logo URLs for OIDC clients from templates (set to false to make it opt-in per client)
  autoGenerateLogos: true

  # timezone sets the TZ env var on the operator container, which determines the
  # local timezone used for clientSecretRotation.window cron expressions.
  # When unset, falls back to instance.spec.timezone; if neither is set the TZ
  # env var is left unset.
  timezone: ""

  # Default URL template for light logos ({{name}} is replaced with the client name)
  # Defaults to the dashboard-icons CDN if not set
  # defaultLogoUrl: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/{{name}}.png"
  # Default URL template for dark logos
  # defaultDarkLogoUrl: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/{{name}}-dark.png"

  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true

  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi

# Operator metrics configuration
# See https://github.com/aclerici38/pocket-id-operator/blob/main/docs/metrics.md
metrics:
  enabled: false
  port: 8080
  serviceMonitor:
    enabled: false
  prometheusRule:
    # Enabled by default when the PrometheusRule CRD is available on the cluster.
    # Set to false to explicitly disable.
    enabled: true
    labels: {}
    # Toggle individual default alerting rules on or off. Each rule defaults to
    # enabled; set enabled: false to omit it from the generated PrometheusRule.
    rules:
      PocketIDInstanceNotReady:
        enabled: true
      PocketIDResourceNotReady:
        enabled: true
      PocketIDAPIHighErrorRate:
        enabled: true
      PocketIDAPISlowRequests:
        enabled: true
      PocketIDExternalDeletions:
        enabled: true
      PocketIDReconcileErrors:
        enabled: true
      PocketIDWorkQueueBackup:
        enabled: true
      PocketIDOIDCClientPKCESupported:
        enabled: true
      PocketIDOIDCClientRotationFailing:
        enabled: true
      PocketIDOIDCClientRotationOverdue:
        enabled: true
      PocketIDOIDCClientRotationWindowMissed:
        enabled: true
      PocketIDOIDCClientRotationDeferrals:
        enabled: true
    # Additional custom alerting rules appended to the default set
    additionalRules: []
  # Setting dashboard.enabled creates a configmap with the dashboard json.
  # When enabled, the GrafanaDashboard CRD is also created automatically
  # if the grafana-operator CRD is available on the cluster.
  # Set grafanaDashboard.enabled to false to explicitly disable it.
  dashboard:
    enabled: false
    labels:
      grafana_dashboard: "1"
    grafanaDashboard:
      enabled: true
      allowCrossNamespaceImport: true
      instanceSelector:
        # Defaults to {grafana.internal/instance: grafana} when left empty.
        matchLabels: {}

# pocket-id-instance subchart
# Instance is disabled by default to maintain compatibility with the deprecated values below.
# For new installs, or to migrate in place, set the deprecated `instance.enabled: false`
# below and configure everything here.
# Full schema: charts/pocket-id-instance/values.yaml
pocket-id-instance:
  # A single PocketIDInstance.
  instance:
    # Set to false to manage only users/groups/clients (e.g. the instance lives
    # in another release or namespace).
    enabled: false

    # Name of the PocketIDInstance resource. Users/groups/clients in this release
    # auto-bind to it via a pocketid.internal/instance: <name> label selector.
    name: pocket-id

    labels: {}
    annotations: {}

    # ServiceMonitor for the instance (requires the instance's spec.metrics.enabled
    # and the Prometheus Operator's ServiceMonitor CRD).
    serviceMonitor:
      enabled: true

    # PocketIDInstance spec. See docs/pocketidinstance.md for the full field list.
    spec:
      # REQUIRED
      encryptionKey:
        # valueFrom:
        #   secretKeyRef:
        #     name: pocket-id-encryption-key
        #     key: encryptionKey
        # value: "your-encryption-key-here-min-16-chars"

      # Common extras
      # appUrl: https://auth.example.com
      # databaseUrl: /app/data/pocket-id.db   # or postgres://localhost/pocket-id
      # persistence:
      #   existingClaim: pocket-id
      # smtp:
      #   host: smtp.example.com
      #   port: 587
      #   from: no-reply@example.com
      #   tls: starttls
      # metrics:
      #   enabled: true

  # PocketIDUser resources.
  users: []
    # - name: admin
    #   spec:
    #     admin: true
    #     email:
    #       value: admin@example.com
    #     firstName:
    #       value: Admin

  # PocketIDUserGroup resources.
  userGroups: []
    # - name: admins
    #   spec:
    #     friendlyName: Admins
    #     users:
    #       userRefs:
    #         - name: admin

  # PocketIDOIDCClient resources.
  oidcClients: []
    # - name: grafana
    #   spec:
    #     callbackUrls:
    #       - https://grafana.example.com/login/generic_oauth
    #     pkceEnabled: true
    #     allowedUserGroups:
    #       - name: admins

# DEPRECATED: the `instance`, `users`, and `userGroups` keys below are
# deprecated and will be removed in a future release. Configure your Pocket ID
# resources under the `pocket-id-instance` subchart key at the top of this
# file instead — that is where the examples now live. Two migration options:
#   1. In place, no resource recreation: set `instance.enabled: false` here and
#      move your config under the `pocket-id-instance` key above.
#   2. Separate release: use the standalone pocket-id-instance chart, or apply
#      the PocketID* resources directly.
# https://github.com/aclerici38/pocket-id-operator/tree/main/charts/pocket-id-instance
instance:
  enabled: true
  name: pocket-id
  labels: {}
  annotations: {}
  serviceMonitor:
    enabled: false
  # PocketIDInstance spec. See the `pocket-id-instance` block above for examples.
  spec:
    encryptionKey:

# DEPRECATED: configure users under `pocket-id-instance.users` above instead.
users: []

# DEPRECATED: configure groups under `pocket-id-instance.userGroups` above instead.
userGroups: []
