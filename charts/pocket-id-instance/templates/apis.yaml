{{- range .Values.apis }}
---
{{- $spec := deepCopy (.spec | default dict) }}
{{/* Bind to this release's instance unless the instance is disabled or the
     resource already sets its own instanceSelector. */}}
{{- if and $.Values.instance.enabled (not (hasKey $spec "instanceSelector")) }}
{{- $_ := set $spec "instanceSelector" (dict "matchLabels" (include "pocket-id-instance.selectorLabels" $ | fromYaml)) }}
{{- end }}
apiVersion: pocketid.internal/v1alpha1
kind: PocketIDAPI
metadata:
  name: {{ .name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app.kubernetes.io/name: pocket-id
    {{- include "pocket-id-instance.labels" (dict "root" $ "component" "api") | nindent 4 }}
    {{- with .labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- toYaml $spec | nindent 2 }}
{{- end }}
