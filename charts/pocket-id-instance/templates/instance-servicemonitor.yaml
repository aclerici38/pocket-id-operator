{{- $inst := .Values.instance -}}
{{/* Off by default. Auto-created when the instance is deployed here with metrics
     enabled (instance.enabled and spec.metrics.enabled) and the ServiceMonitor
     CRD is present. serviceMonitor.enabled: false is a hard opt-out that
     overrides all of the above. */}}
{{- if and $inst.enabled (ne $inst.serviceMonitor.enabled false) (dig "metrics" "enabled" false ($inst.spec | default dict)) (.Capabilities.APIVersions.Has "monitoring.coreos.com/v1") -}}
{{- $name := include "pocket-id-instance.instanceName" . -}}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ $name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: pocket-id
    {{- include "pocket-id-instance.labels" (dict "root" . "component" "instance") | nindent 4 }}
    {{- with $inst.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  endpoints:
    - port: metrics
      path: /metrics
      {{- with $inst.serviceMonitor.interval }}
      interval: {{ . }}
      {{- end }}
  selector:
    {{- /* Targets the Service the operator creates for the instance, which is
           labeled by the operator with name=pocket-id + instance=<instance name>
           (the PocketIDInstance name, NOT the Helm release name). */}}
    matchLabels:
      app.kubernetes.io/name: pocket-id
      app.kubernetes.io/instance: {{ $name }}
{{- end -}}
