# Install everything with `mise install`. Run `mise tasks` to list tasks,
# `mise run <task>` to run one. Multi-line tasks live in ./.mise-tasks.

[settings]
experimental = true
lockfile = true
lockfile_platforms = ["linux-x64", "linux-arm64", "macos-arm64"]

[tools]
go = "1.26.5"

# Kubernetes manifest tooling
kustomize = "5.8.1"
"go:sigs.k8s.io/controller-tools/cmd/controller-gen" = "0.21.0"

# Test tooling
setup-envtest = "0.24.1"
# ginkgo stays a go: build so the CLI matches the ginkgo library version
"go:github.com/onsi/ginkgo/v2/ginkgo" = "v2.32.0"

# Linting
golangci-lint = "2.12.2"
zizmor = "1.28.0"

# Local cluster / cluster CLIs for e2e and chart tests
kind = "0.32.0"
kubectl = "1.36.3"
helm = "4.2.3"

# CRD → JSON schema conversion
"aqua:sholdee/crd-schema-publisher" = "2026.721.161952"

# Git hooks
lefthook = "2.1.10"

# Changelog generation
"aqua:orhun/git-cliff" = "2.13.1"

# Register lefthook's git hooks after `mise install`. 
# No-op in CI jobs
[hooks]
postinstall = "command -v lefthook >/dev/null 2>&1 && lefthook install || true"

[env]
# Default image for the docker/deploy tasks. Override with `IMG=… mise run …`.
# Kept separate from IMG so it never leaks into the e2e suite's image logic.
DEFAULT_IMG = "ghcr.io/aclerici38/pocket-id-operator:v0.6.1@sha256:2c6b9c89e2e7f4300eaeef7c2853cd7ca9961eeb19e676bbeccdc69c4282dd9c"
KIND_CLUSTER = "pocket-id-operator-test-e2e"
CONTAINER_TOOL = "docker"
PLATFORMS = "linux/arm64,linux/amd64,linux/s390x,linux/ppc64le"

## ── Development ──────────────────────────────────────────────────────────
[tasks.generate]
description = "Generate DeepCopy method implementations"
run = 'controller-gen object:headerFile="hack/boilerplate.go.txt" paths="./..."'

[tasks.fmt]
description = "Run go fmt"
run = "go fmt ./..."

[tasks.vet]
description = "Run go vet"
run = "go vet ./..."

[tasks.regen]
description = "Regenerate every derived file from the API types (deepcopy, CRDs, installer, schemas). Run after changing api/. Formatting/vetting is left to pre-commit and the lint/test workflows."
# Aggregator only. build-installer needs manifests+generate; generate-schemas
# needs manifests. Declaring both as deps lets mise run the shared manifests and
# generate once, then build-installer and generate-schemas in parallel.
depends = ["build-installer", "generate-schemas"]

[tasks.test]
description = "Regenerate, format, vet, then run unit tests"
depends = ["manifests", "generate", "fmt", "vet"]
run = "mise run test-only"

[tasks.test-e2e]
description = "Run the full e2e suite against a Kind cluster"
depends = ["manifests", "generate", "fmt", "vet", "setup-test-e2e"]
run = "mise run test-e2e-only"

[tasks.cleanup-test-e2e]
description = "Tear down the e2e Kind cluster"
run = 'kind delete cluster --name "$KIND_CLUSTER"'

[tasks.lint]
description = "Run golangci-lint"
run = "golangci-lint run"

[tasks.lint-fix]
description = "Run golangci-lint with --fix"
run = "golangci-lint run --fix"

[tasks.lint-config]
description = "Verify golangci-lint configuration"
run = "golangci-lint config verify"

[tasks.helm-deps]
description = "Vendor the pocket-id-instance subchart into pocket-id-operator/charts as an unpacked directory. The dependency is declared in Chart.yaml (Helm 3.4+ lints for it), but helm v4 will not load a local file:// dependency from the .tgz that `helm dependency update` produces. `helm package` respects .helmignore and gives canonical content; we unpack it to the directory form helm v4 loads. Do not run `helm dependency update` here."
run = '''
set -e
dest=charts/pocket-id-operator/charts
tmp=$(mktemp -d)
rm -rf "$dest"
mkdir -p "$dest"
helm package charts/pocket-id-instance --destination "$tmp" >/dev/null
tar -xzf "$tmp"/pocket-id-instance-*.tgz -C "$dest"
rm -rf "$tmp"
'''

[tasks.lint-chart]
description = "Strictly lint the Helm charts, with and without a managed instance (--strict promotes warnings to failures)"
depends = ["helm-deps"]
run = [
  "helm lint --strict charts/pocket-id-operator --values .github/helm-test-values.yaml",
  "helm lint --strict charts/pocket-id-operator --values .github/helm-test-values-deprecated.yaml",
  "helm lint --strict charts/pocket-id-operator --set instance.enabled=false",
  "helm lint --strict charts/pocket-id-instance --values .github/helm-test-values-instance.yaml",
  "helm lint --strict charts/pocket-id-instance --set instance.enabled=false",
]

[tasks.setup-test-e2e]
description = "Create the e2e Kind cluster if it does not exist"
run = '''
if kind get clusters 2>/dev/null | grep -q "^${KIND_CLUSTER}$"; then
  echo "Kind cluster '${KIND_CLUSTER}' already exists. Skipping creation."
else
  echo "Creating Kind cluster '${KIND_CLUSTER}'..."
  kind create cluster --name "${KIND_CLUSTER}"
fi
'''

## ── Build ────────────────────────────────────────────────────────────────
[tasks.build]
description = "Build the manager binary"
depends = ["manifests", "generate", "fmt", "vet"]
run = "go build -o bin/manager cmd/main.go"

[tasks.dev]
description = "Run a controller from your host"
depends = ["manifests", "generate", "fmt", "vet"]
run = "go run ./cmd/main.go"

[tasks.docker-build]
description = "Build the manager image"
run = '$CONTAINER_TOOL build -t "${IMG:-$DEFAULT_IMG}" .'

[tasks.docker-push]
description = "Push the manager image"
run = '$CONTAINER_TOOL push "${IMG:-$DEFAULT_IMG}"'

[tasks.build-installer]
description = "Generate a consolidated install.yaml (CRDs + deployment) and a standalone crds.yaml"
depends = ["manifests", "generate"]
run = [
  "mkdir -p dist",
  "kustomize build config/default > dist/install.yaml",
  "kustomize build config/crd > dist/crds.yaml",
]

## ── Deployment ───────────────────────────────────────────────────────────
[tasks.install]
description = "Install CRDs into the cluster in ~/.kube/config"
depends = ["manifests"]
run = '''
out="$(kustomize build config/crd 2>/dev/null || true)"
if [ -n "$out" ]; then echo "$out" | kubectl apply --server-side -f -; else echo "No CRDs to install; skipping."; fi
'''

[tasks.uninstall]
description = "Uninstall CRDs (set IGNORE_NOT_FOUND=true to ignore missing resources)"
depends = ["manifests"]
run = '''
out="$(kustomize build config/crd 2>/dev/null || true)"
if [ -n "$out" ]; then echo "$out" | kubectl delete --ignore-not-found="${IGNORE_NOT_FOUND:-false}" -f -; else echo "No CRDs to delete; skipping."; fi
'''

[tasks.deploy]
description = "Deploy the controller to the cluster in ~/.kube/config"
depends = ["manifests"]
run = '''
(cd config/manager && kustomize edit set image ghcr.io/aclerici38/pocket-id-operator="${IMG:-$DEFAULT_IMG}")
kustomize build config/default | kubectl apply --server-side -f -
'''

[tasks.deploy-e2e]
description = "Deploy the controller with a faster resync interval for e2e tests"
depends = ["manifests"]
run = '''
(cd config/manager && kustomize edit set image ghcr.io/aclerici38/pocket-id-operator="${IMG:-$DEFAULT_IMG}")
kustomize build config/e2e | kubectl apply --server-side -f -
'''

[tasks.undeploy]
description = "Undeploy the controller (set IGNORE_NOT_FOUND=true to ignore missing resources)"
run = 'kustomize build config/default | kubectl delete --ignore-not-found="${IGNORE_NOT_FOUND:-false}" -f -'
