name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., v1.0.0)"
        required: true
        type: string

env:
  # install_args installs this job's tool subset; don't let `mise run`
  # auto-install the rest of mise.toml on top of it.
  MISE_TASK_RUN_AUTO_INSTALL: "false"

jobs:
  validate:
    name: Validate version
    permissions: {}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.validate.outputs.version }}
      helm_version: ${{ steps.validate.outputs.helm_version }}
      image_repo: ${{ steps.validate.outputs.image_repo }}
    steps:
      - name: Validate version format
        id: validate
        env:
          VERSION: ${{ inputs.version }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          # Ensure version starts with 'v'
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9] ]]; then
            echo "::error::Version must be in format v0.0.0"
            exit 1
          fi

          HELM_VERSION="${VERSION#v}"
          REPO_OWNER=$(echo "${REPO_OWNER}" | tr '[:upper:]' '[:lower:]')

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "helm_version=${HELM_VERSION}" >> "$GITHUB_OUTPUT"
          echo "image_repo=ghcr.io/${REPO_OWNER}/pocket-id-operator" >> "$GITHUB_OUTPUT"

  generate-changelog:
    name: Generate Artifact Hub changelog
    permissions:
      contents: read
    needs:
      - validate
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.changelog.outputs.content }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          config: cliff-artifacthub.toml
          args: --unreleased --strip header
  retag-image:
    name: Retag Docker image
    permissions:
      packages: write
    needs:
      - validate
      - generate-changelog
    runs-on: ubuntu-latest
    steps:
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag :main image as release version
        env:
          IMAGE_REPO: ${{ needs.validate.outputs.image_repo }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          docker buildx imagetools create \
            -t "${IMAGE_REPO}:${VERSION}" \
            "${IMAGE_REPO}:main"

  publish-chart:
    name: Publish Helm chart
    permissions:
      actions: write
      contents: read
      id-token: write
      packages: write
    needs:
      - validate
      - generate-changelog
    uses: ./.github/workflows/push-chart.yaml
    with:
      chart_version: ${{ needs.validate.outputs.helm_version }}
      app_version: ${{ needs.validate.outputs.version }}
      changelog: ${{ needs.generate-changelog.outputs.changelog }}

  tag:
    name: Create Git tag
    permissions:
      contents: write
    needs:
      - validate
      - retag-image
      - publish-chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check if tag exists
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          if git rev-parse "${VERSION}" >/dev/null 2>&1; then
            echo "::error::Tag ${VERSION} already exists"
            exit 1
          fi

      - name: Create and push tag
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          git tag -a "${VERSION}" -m "Release ${VERSION}"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" "${VERSION}"

  create-release:
    name: Create GitHub Release
    permissions:
      contents: write
    needs:
      - validate
      - tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.validate.outputs.version }}
          fetch-depth: 0
          persist-credentials: false

      - name: Generate changelog
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: /tmp/changelog.md

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          # renovate: datasource=github-releases depName=jdx/mise
          version: "2026.6.14"
          install_args: "go:sigs.k8s.io/controller-tools/cmd/controller-gen kustomize"

      - name: Generate install manifest
        env:
          IMAGE_REPO: ${{ needs.validate.outputs.image_repo }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          IMG="${IMAGE_REPO}:${VERSION}" mise run build-installer

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          gh release create "${VERSION}" \
            --title "${VERSION}" \
            --notes-file /tmp/changelog.md \
            dist/install.yaml \
            dist/schemas/*.json \
            dist/chart/values.schema.json
