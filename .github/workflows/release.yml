name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., v1.0.0)"
        required: true
        type: string

permissions:
  actions: write
  attestations: write
  contents: write
  id-token: write
  packages: write

env:
  # renovate: datasource=github-releases depName=kubernetes-sigs/controller-tools
  CONTROLLER_TOOLS_VERSION: v0.20.1
  # renovate: datasource=github-releases depName=kubernetes-sigs/kustomize
  KUSTOMIZE_VERSION: v5.7.1

jobs:
  validate:
    name: Validate version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.validate.outputs.version }}
      helm_version: ${{ steps.validate.outputs.helm_version }}
      image_repo: ${{ steps.validate.outputs.image_repo }}
    steps:
      - name: Validate version format
        id: validate
        run: |
          VERSION="${{ inputs.version }}"

          # Ensure version starts with 'v'
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9] ]]; then
            echo "::error::Version must be in format v0.0.0"
            exit 1
          fi

          HELM_VERSION="${VERSION#v}"
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "helm_version=${HELM_VERSION}" >> "$GITHUB_OUTPUT"
          echo "image_repo=ghcr.io/${REPO_OWNER}/pocket-id-operator" >> "$GITHUB_OUTPUT"

  tag:
    name: Create Git tag
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check if tag exists
        run: |
          if git rev-parse "${{ needs.validate.outputs.version }}" >/dev/null 2>&1; then
            echo "::error::Tag ${{ needs.validate.outputs.version }} already exists"
            exit 1
          fi

      - name: Create and push tag
        run: |
          git tag -a "${{ needs.validate.outputs.version }}" -m "Release ${{ needs.validate.outputs.version }}"
          git push origin "${{ needs.validate.outputs.version }}"

  retag-image:
    name: Retag Docker image
    needs:
      - validate
      - tag
    runs-on: ubuntu-latest
    steps:
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag :main image as release version
        run: |
          docker buildx imagetools create \
            -t ${{ needs.validate.outputs.image_repo }}:${{ needs.validate.outputs.version }} \
            ${{ needs.validate.outputs.image_repo }}:main

  generate-changelog:
    name: Generate Artifact Hub changelog
    needs:
      - validate
      - tag
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.changelog.outputs.content }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.validate.outputs.version }}
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4.7.1
        with:
          config: cliff-artifacthub.toml
          args: --latest --strip header

  publish-chart:
    name: Publish Helm chart
    needs:
      - validate
      - tag
      - generate-changelog
    uses: ./.github/workflows/push-chart.yml
    with:
      chart_version: ${{ needs.validate.outputs.helm_version }}
      app_version: ${{ needs.validate.outputs.version }}
      changelog: ${{ needs.generate-changelog.outputs.changelog }}
    secrets: inherit

  create-release:
    name: Create GitHub Release
    needs:
      - validate
      - tag
      - retag-image
      - publish-chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.validate.outputs.version }}
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4.7.1
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: /tmp/changelog.md

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache tool binaries
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: bin
          key: tools-${{ runner.os }}-go-${{ hashFiles('go.mod') }}-kustomize-${{ env.KUSTOMIZE_VERSION }}-controller-gen-${{ env.CONTROLLER_TOOLS_VERSION }}

      - name: Generate install manifest
        run: |
          make build-installer IMG=${{ needs.validate.outputs.image_repo }}:${{ needs.validate.outputs.version }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@71d29a04ae7c63895f38299d7a5e05d238f7f445 # v2.5.1
        with:
          tag_name: ${{ needs.validate.outputs.version }}
          name: ${{ needs.validate.outputs.version }}
          body_path: /tmp/changelog.md
          files: |
            dist/install.yaml
            dist/schemas/*.json
            dist/chart/values.schema.json
