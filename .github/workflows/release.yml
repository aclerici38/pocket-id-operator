name: Release

on:
  release:
    types: [created]

permissions:
  actions: write
  attestations: write
  contents: write
  id-token: write
  packages: write

env:
  # renovate: datasource=github-releases depName=kubernetes-sigs/controller-tools
  CONTROLLER_TOOLS_VERSION: v0.20.1
  # renovate: datasource=github-releases depName=kubernetes-sigs/kustomize
  KUSTOMIZE_VERSION: v5.7.1

jobs:
  meta:
    name: Release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      helm_version: ${{ steps.meta.outputs.helm_version }}
      repo_owner: ${{ steps.meta.outputs.repo_owner }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Extract metadata
        id: meta
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          HELM_VERSION="${VERSION#v}"
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          SHORT_SHA=$(git rev-parse --short HEAD)

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "helm_version=${HELM_VERSION}" >> "$GITHUB_OUTPUT"
          echo "repo_owner=${REPO_OWNER}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

  retag-image:
    name: Retag Docker image
    needs: [meta]
    runs-on: ubuntu-latest
    steps:
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for CI image and retag as release version
        run: |
          REPO_OWNER="${{ needs.meta.outputs.repo_owner }}"
          SHORT_SHA="${{ needs.meta.outputs.short_sha }}"
          # Use the per-commit stable tag published by CI rather than :main,
          # so we pin to exactly the commit release-please tagged.
          SOURCE="ghcr.io/${REPO_OWNER}/pocket-id-operator:${SHORT_SHA}-main"

          echo "Waiting for source image: ${SOURCE}"
          for i in $(seq 1 20); do
            if docker buildx imagetools inspect "${SOURCE}" >/dev/null 2>&1; then
              echo "Source image available after attempt ${i}"
              break
            fi
            [ "$i" = "20" ] && { echo "Timed out waiting for source image"; exit 1; }
            echo "Attempt ${i}/20 — retrying in 30s..."
            sleep 30
          done

          docker buildx imagetools create \
            -t ghcr.io/${REPO_OWNER}/pocket-id-operator:${{ needs.meta.outputs.version }} \
            "${SOURCE}"

  publish-chart:
    name: Publish Helm chart
    needs: [meta, retag-image]
    uses: ./.github/workflows/publish-chart.yml
    with:
      chart_version: ${{ needs.meta.outputs.helm_version }}
      app_version: ${{ needs.meta.outputs.version }}
      repo_owner: ${{ needs.meta.outputs.repo_owner }}
      primary_tag: ${{ needs.meta.outputs.helm_version }}
    secrets: inherit

  upload-artifacts:
    name: Upload release artifacts
    needs: [meta, retag-image, publish-chart]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.meta.outputs.version }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache tool binaries
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: bin
          key: tools-${{ runner.os }}-go-${{ hashFiles('go.mod') }}-kustomize-${{ env.KUSTOMIZE_VERSION }}-controller-gen-${{ env.CONTROLLER_TOOLS_VERSION }}

      - name: Generate install manifest
        run: |
          make build-installer IMG=ghcr.io/${{ needs.meta.outputs.repo_owner }}/pocket-id-operator:${{ needs.meta.outputs.version }}

      - name: Upload artifacts to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ needs.meta.outputs.version }} \
            dist/install.yaml \
            dist/schemas/*.json \
            dist/chart/values.schema.json \
            --clobber
