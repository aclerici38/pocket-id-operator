name: Tests

on:
  workflow_call:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

env:
  # install_args installs this job's tool subset; don't let `mise run`
  # auto-install the rest of mise.toml on top of it.
  MISE_TASK_RUN_AUTO_INSTALL: "false"

jobs:
  test:
    name: Run unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Setup mise
        uses: jdx/mise-action@f10502fc09dadecfefb962fff68ce77213930204 # v4.2.2
        with:
          # renovate: datasource=github-releases depName=jdx/mise
          version: "2026.7.7"
          install_args: setup-envtest

      - name: Run tests
        run: mise run test-only
