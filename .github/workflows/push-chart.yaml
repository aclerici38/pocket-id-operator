name: Push Chart

on:
  workflow_call:
    inputs:
      chart_version:
        description: Version to use for the Helm chart (e.g., "0.0.0" or "1.2.3").
        required: true
        type: string
      app_version:
        description: App version to embed in the chart (e.g., "0.0.0" or "v1.2.3").
        required: true
        type: string
      additional_tags:
        description: Space-separated additional tags to apply to the chart.
        required: false
        type: string
        default: ""
      changelog:
        description: Artifact Hub changelog annotation.
        required: false
        type: string
        default: ""
      ref:
        description: Git ref/SHA to build the chart from. Empty uses the triggering ref.
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      chart_version:
        description: Version to use for the Helm chart (e.g., "0.0.0" or "1.2.3").
        required: true
        type: string
      app_version:
        description: App version to embed in the chart (e.g., "0.0.0" or "v1.2.3").
        required: true
        type: string
      additional_tags:
        description: Space-separated additional tags to apply to the chart.
        required: false
        type: string
        default: ""
      changelog:
        description: Artifact Hub changelog annotation.
        required: false
        type: string
        default: ""
      ref:
        description: Git ref/SHA to build the chart from. Empty uses the triggering ref.
        required: false
        type: string
        default: ""

permissions:
  actions: write
  contents: read
  id-token: write
  packages: write

jobs:
  publish:
    name: Package and publish ${{ matrix.chart }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        chart:
          - pocket-id-operator
          - pocket-id-instance
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Set metadata
        id: meta
        env:
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          REPO_OWNER=$(echo "${REPO_OWNER}" | tr '[:upper:]' '[:lower:]')
          CHART_NAME=$(awk -F': ' '$1=="name"{print $2}' "charts/${{ matrix.chart }}/Chart.yaml" | tr -d '"')
          CHART_REF="ghcr.io/${REPO_OWNER}/charts/${CHART_NAME}"
          echo "chart_ref=${CHART_REF}" >> "$GITHUB_OUTPUT"

      - name: Setup mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          # renovate: datasource=github-releases depName=jdx/mise
          version: "2026.7.5"
          install_args: helm

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Inject changelog annotation
        if: inputs.changelog != ''
        env:
          CHANGELOG: ${{ inputs.changelog }}
        run: |
          yq -i '.annotations."artifacthub.io/changes" = strenv(CHANGELOG)' "charts/${{ matrix.chart }}/Chart.yaml"

      - name: Vendor subchart dependency
        if: matrix.chart == 'pocket-id-operator'
        run: mise run helm-deps

      - name: Package chart
        env:
          CHART_VERSION: ${{ inputs.chart_version }}
          APP_VERSION: ${{ inputs.app_version }}
        run: |
          mkdir -p "charts/${{ matrix.chart }}-packages"
          helm package "charts/${{ matrix.chart }}" \
            --version "${CHART_VERSION}" \
            --app-version "${APP_VERSION}" \
            --destination "charts/${{ matrix.chart }}-packages"

      - name: Push chart
        id: push
        env:
          CHART_REF: ${{ steps.meta.outputs.chart_ref }}
        run: |
          PUSH_OUTPUT=$(helm push "charts/${{ matrix.chart }}-packages"/*.tgz \
            "oci://$(dirname "${CHART_REF}")" 2>&1)
          echo "$PUSH_OUTPUT"
          DIGEST=$(echo "$PUSH_OUTPUT" | grep "Digest:" | awk '{print $2}')
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Setup ORAS
        uses: oras-project/setup-oras@1d808f7d7f6995cc68b7bf507bfe5c5446e1dc9d # v2.0.1

      - name: Apply additional tags
        if: inputs.additional_tags != ''
        env:
          ADDITIONAL_TAGS: ${{ inputs.additional_tags }}
          CHART_REF: ${{ steps.meta.outputs.chart_ref }}
          CHART_VERSION: ${{ inputs.chart_version }}
        run: |
          for tag in $ADDITIONAL_TAGS; do
            oras tag \
              "${CHART_REF}:${CHART_VERSION}" \
              "${tag}"
          done

      - name: Push Artifact Hub metadata
        # https://artifacthub.io/docs/topics/repositories/helm-charts/#oci-support
        # Skipped for charts without their own artifacthub-repo.yaml
        if: hashFiles(format('charts/{0}/artifacthub-repo.yaml', matrix.chart)) != ''
        env:
          CHART_REF: ${{ steps.meta.outputs.chart_ref }}
        run: |
          oras push \
            "${CHART_REF}:artifacthub.io" \
            --config /dev/null:application/vnd.cncf.artifacthub.config.v1+yaml \
            "charts/${{ matrix.chart }}/artifacthub-repo.yaml:application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml"

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign chart
        env:
          CHART_REF: ${{ steps.meta.outputs.chart_ref }}
          CHART_DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          cosign sign --yes \
            "${CHART_REF}@${CHART_DIGEST}"

      - name: Verify chart signature
        env:
          REPOSITORY: ${{ github.repository }}
          CHART_REF: ${{ steps.meta.outputs.chart_ref }}
          CHART_DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          cosign verify \
            --certificate-identity-regexp "https://github.com/${REPOSITORY}/" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${CHART_REF}@${CHART_DIGEST}"
