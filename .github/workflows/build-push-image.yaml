name: Build Image

on:
  workflow_call:
    inputs:
      image_repo:
        description: Image repository (e.g., ghcr.io/owner/pocket-id-operator).
        required: true
        type: string
      image_tag:
        description: Primary image tag to build and push.
        required: true
        type: string
      additional_tags:
        description: Space-separated additional tags to apply to the manifest.
        required: false
        type: string
        default: ""
      push:
        description: Push image to registry and create multi-arch manifest.
        required: false
        type: boolean
        default: true
      attest:
        description: Attest build provenance for the image.
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      image_repo:
        description: Image repository (e.g., ghcr.io/owner/pocket-id-operator).
        required: true
        type: string
      image_tag:
        description: Primary image tag to build and push.
        required: true
        type: string
      additional_tags:
        description: Space-separated additional tags to apply to the manifest.
        required: false
        type: string
        default: ""
      push:
        description: Push image to registry and create multi-arch manifest.
        required: false
        type: boolean
        default: true
      attest:
        description: Attest build provenance for the image.
        required: false
        type: boolean
        default: false

jobs:
  build-amd64:
    name: Build and push amd64 image
    permissions:
      actions: write
      contents: read
      packages: write
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        if: inputs.push
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        if: inputs.push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        id: build
        with:
          context: .
          platforms: linux/amd64
          outputs: type=image,name=${{ inputs.image_repo }},push-by-digest=true,name-canonical=true,push=true
          cache-from: |
            type=gha,scope=build-amd64
            type=gha,scope=build-amd64-main
          cache-to: type=gha,mode=max,scope=build-amd64

      - name: Build local image for e2e
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          load: true
          tags: ${{ inputs.image_repo }}:${{ inputs.image_tag }}
          cache-from: type=gha,scope=build-amd64

      - name: Save image as artifact
        env:
          IMAGE_REPO: ${{ inputs.image_repo }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: docker save "${IMAGE_REPO}:${IMAGE_TAG}" -o "/tmp/operator-image-${IMAGE_TAG}.tar"

      - name: Upload image artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: operator-image-${{ inputs.image_tag }}
          path: /tmp/operator-image-${{ inputs.image_tag }}.tar
          retention-days: 1

  build-arm64:
    name: Build and push arm64 image
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-24.04-arm
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GitHub Container Registry
        if: inputs.push
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        id: build
        with:
          context: .
          platforms: linux/arm64
          outputs: type=image,name=${{ inputs.image_repo }},push-by-digest=true,name-canonical=true,push=${{ inputs.push }}
          cache-from: |
            type=gha,scope=build-arm64
            type=gha,scope=build-arm64-main
          cache-to: type=gha,mode=max,scope=build-arm64

  manifest:
    name: Create multi-arch manifest
    permissions:
      packages: write
    if: inputs.push
    runs-on: ubuntu-latest
    needs:
      - build-amd64
      - build-arm64
    outputs:
      digest: ${{ steps.inspect.outputs.digest }}
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest
        env:
          IMAGE_REPO: ${{ inputs.image_repo }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          ADDITIONAL_TAGS: ${{ inputs.additional_tags }}
          AMD64_DIGEST: ${{ needs.build-amd64.outputs.digest }}
          ARM64_DIGEST: ${{ needs.build-arm64.outputs.digest }}
        run: |
          TAGS="-t ${IMAGE_REPO}:${IMAGE_TAG}"
          for tag in $ADDITIONAL_TAGS; do
            TAGS="${TAGS} -t ${IMAGE_REPO}:${tag}"
          done
          docker buildx imagetools create \
            ${TAGS} \
            "${IMAGE_REPO}@${AMD64_DIGEST}" \
            "${IMAGE_REPO}@${ARM64_DIGEST}"

      - name: Inspect manifest digest
        id: inspect
        env:
          IMAGE_REPO: ${{ inputs.image_repo }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          DIGEST=$(docker buildx imagetools inspect "${IMAGE_REPO}:${IMAGE_TAG}" --format '{{printf "%s" .Manifest.Digest}}')
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

  attest:
    name: Attest image
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    if: inputs.attest
    runs-on: ubuntu-latest
    needs:
      - manifest
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Dependency Snapshot
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          dependency-snapshot: true
          image: ${{ inputs.image_repo }}@${{ needs.manifest.outputs.digest }}

      - name: Attest build provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          push-to-registry: true
          subject-name: ${{ inputs.image_repo }}
          subject-digest: ${{ needs.manifest.outputs.digest }}

      - name: Verify attestation
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          IMAGE_REPO: ${{ inputs.image_repo }}
          MANIFEST_DIGEST: ${{ needs.manifest.outputs.digest }}
        run: |
          gh attestation verify \
            --repo "${REPOSITORY}" \
            "oci://${IMAGE_REPO}@${MANIFEST_DIGEST}"
