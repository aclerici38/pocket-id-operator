name: Build Image

on:
  workflow_call:
    inputs:
      image_repo:
        description: Image repository (e.g., ghcr.io/owner/pocket-id-operator).
        required: true
        type: string
      image_tag:
        description: Primary image tag to build and push.
        required: true
        type: string
      additional_tags:
        description: Space-separated additional tags to apply to the manifest.
        required: false
        type: string
        default: ""
      push:
        description: Push image to registry and create multi-arch manifest.
        required: false
        type: boolean
        default: true
  workflow_dispatch:
    inputs:
      image_repo:
        description: Image repository (e.g., ghcr.io/owner/pocket-id-operator).
        required: true
        type: string
      image_tag:
        description: Primary image tag to build and push.
        required: true
        type: string
      additional_tags:
        description: Space-separated additional tags to apply to the manifest.
        required: false
        type: string
        default: ""
      push:
        description: Push image to registry and create multi-arch manifest.
        required: false
        type: boolean
        default: true

permissions:
  actions: write
  attestations: write
  contents: write
  id-token: write
  packages: write

jobs:
  build-amd64:
    name: Build and push amd64 image
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        if: inputs.push
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        if: inputs.push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        id: build
        with:
          context: .
          platforms: linux/amd64
          outputs: type=image,name=${{ inputs.image_repo }},push-by-digest=true,name-canonical=true,push=true
          cache-from: |
            type=gha,scope=build-amd64
            type=gha,scope=build-amd64-main
          cache-to: type=gha,mode=max,scope=build-amd64

      - name: Build local image for e2e
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          load: true
          tags: ${{ inputs.image_repo }}:${{ inputs.image_tag }}
          cache-from: type=gha,scope=build-amd64

      - name: Save image as artifact
        run: docker save ${{ inputs.image_repo }}:${{ inputs.image_tag }} -o /tmp/operator-image-${{ inputs.image_tag }}.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: operator-image-${{ inputs.image_tag }}
          path: /tmp/operator-image-${{ inputs.image_tag }}.tar
          retention-days: 1

  build-arm64:
    name: Build and push arm64 image
    runs-on: ubuntu-24.04-arm
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        if: inputs.push
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        id: build
        with:
          context: .
          platforms: linux/arm64
          outputs: type=image,name=${{ inputs.image_repo }},push-by-digest=true,name-canonical=true,push=${{ inputs.push }}
          cache-from: |
            type=gha,scope=build-arm64
            type=gha,scope=build-arm64-main
          cache-to: type=gha,mode=max,scope=build-arm64

  manifest:
    name: Create multi-arch manifest
    if: inputs.push
    runs-on: ubuntu-latest
    needs:
      - build-amd64
      - build-arm64
    outputs:
      digest: ${{ steps.inspect.outputs.digest }}
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest
        run: |
          TAGS="-t ${{ inputs.image_repo }}:${{ inputs.image_tag }}"
          for tag in ${{ inputs.additional_tags }}; do
            TAGS="${TAGS} -t ${{ inputs.image_repo }}:${tag}"
          done
          docker buildx imagetools create \
            ${TAGS} \
            ${{ inputs.image_repo }}@${{ needs.build-amd64.outputs.digest }} \
            ${{ inputs.image_repo }}@${{ needs.build-arm64.outputs.digest }}

      - name: Inspect manifest digest
        id: inspect
        run: |
          DIGEST=$(docker buildx imagetools inspect ${{ inputs.image_repo }}:${{ inputs.image_tag }} --format '{{printf "%s" .Manifest.Digest}}')
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

  attest:
    name: Attest image
    if: inputs.push
    runs-on: ubuntu-latest
    needs:
      - manifest
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Dependency Snapshot
        uses: anchore/sbom-action@57aae528053a48a3f6235f2d9461b05fbcb7366d # v0.23.1
        with:
          dependency-snapshot: true
          image: ${{ inputs.image_repo }}@${{ needs.manifest.outputs.digest }}

      - name: Attest build provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          push-to-registry: true
          subject-name: ${{ inputs.image_repo }}
          subject-digest: ${{ needs.manifest.outputs.digest }}

      - name: Verify attestation
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh attestation verify \
            --repo ${{ github.repository }} \
            oci://${{ inputs.image_repo }}@${{ needs.manifest.outputs.digest }}
