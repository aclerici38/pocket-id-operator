name: Test Chart

on:
  workflow_call:
    inputs:
      image_repo:
        description: Image repository (e.g., ghcr.io/owner/pocket-id-operator).
        required: true
        type: string
      image_tag:
        description: Image tag to use for chart installation test.
        required: true
        type: string
  workflow_dispatch:
    inputs:
      image_repo:
        description: Image repository (e.g., ghcr.io/owner/pocket-id-operator).
        required: true
        type: string
      image_tag:
        description: Image tag to use for chart installation test.
        required: true
        type: string

permissions:
  actions: write
  contents: read
  packages: read

env:
  # install_args installs this job's tool subset; don't let `mise run`
  # auto-install the rest of mise.toml on top of it.
  MISE_TASK_RUN_AUTO_INSTALL: "false"

jobs:
  test:
    name: Lint and install test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          # renovate: datasource=github-releases depName=jdx/mise
          version: "2026.7.5"
          install_args: kubectl kind helm

      - name: Resolve latest release
        id: release
        uses: ./.github/actions/latest-release
        with:
          token: ${{ github.token }}

      - name: Lint Helm chart
        run: mise run lint-chart

      - name: Package chart
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          mkdir -p charts/pocket-id-operator-packages
          helm package charts/pocket-id-operator \
            --version "0.0.0" \
            --app-version "${IMAGE_TAG}" \
            --destination charts/pocket-id-operator-packages

      - name: Download image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: operator-image-${{ inputs.image_tag }}
          path: /tmp

      - name: Load image
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: docker load -i "/tmp/operator-image-${IMAGE_TAG}.tar"

      - name: Create kind cluster
        run: kind create cluster --name chart-testing

      - name: Load image into kind
        env:
          IMAGE_REPO: ${{ inputs.image_repo }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: kind load docker-image "${IMAGE_REPO}:${IMAGE_TAG}" --name chart-testing

      - name: Install released chart
        id: install-released
        continue-on-error: true
        env:
          CHART: ${{ steps.release.outputs.chart }}
          CHART_VERSION: ${{ steps.release.outputs.chart_version }}
          IMAGE_REPO: ${{ inputs.image_repo }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          REPOSITORY: ${{ github.repository }}
        run: |
          helm install test-release "${CHART}" \
            --version "${CHART_VERSION}" \
            --create-namespace \
            --namespace pocket-id-operator-system \
            --values "https://raw.githubusercontent.com/${REPOSITORY}/${RELEASE_TAG}/.github/helm-test-values.yaml" \
            --set "operator.image.repository=${IMAGE_REPO}" \
            --set "operator.image.tag=${RELEASE_TAG}" \
            --wait \
            --timeout 2m

      - name: Warn if released chart install failed
        if: steps.install-released.outcome == 'failure'
        run: |
          echo "::warning::Released chart install failed — skipping upgrade test. The released chart may have a known issue."
          helm uninstall test-release --namespace pocket-id-operator-system --ignore-not-found || true

      - name: Upgrade to current chart
        env:
          IMAGE_REPO: ${{ inputs.image_repo }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          helm upgrade --install test-release charts/pocket-id-operator-packages/*.tgz \
            --namespace pocket-id-operator-system \
            --create-namespace \
            --values .github/helm-test-values.yaml \
            --set "operator.image.repository=${IMAGE_REPO}" \
            --set "operator.image.tag=${IMAGE_TAG}" \
            --wait \
            --timeout 2m

      - name: Debug on failure
        if: failure()
        run: |
          echo "=== Manager Pod Logs ==="
          kubectl logs -n pocket-id-operator-system -l control-plane=controller-manager --tail=100 || true
          echo "=== PocketIDInstance Status ==="
          kubectl get pocketidinstance -n pocket-id-operator-system -o yaml || true
          echo "=== PocketIDUser Status ==="
          kubectl get pocketiduser -n pocket-id-operator-system -o yaml || true
          echo "=== PocketIDUserGroup Status ==="
          kubectl get pocketidusergroup -n pocket-id-operator-system -o yaml || true
          echo "=== Pocket-ID Pod Logs ==="
          kubectl logs -n pocket-id-operator-system -l app.kubernetes.io/name=pocket-id --tail=100 || true
          echo "=== All Resources ==="
          kubectl get all -n pocket-id-operator-system || true
          echo "=== Pod Describe ==="
          kubectl describe pods -n pocket-id-operator-system || true

      - name: Verify chart installation
        run: |
          helm status test-release --namespace pocket-id-operator-system
          kubectl get all -n pocket-id-operator-system
          echo "=== Verifying all expected CRs are present ==="
          kubectl get pocketidinstance pocket-id -n pocket-id-operator-system
          kubectl get pocketiduser test-user-1 -n pocket-id-operator-system
          kubectl get pocketiduser test-user-2 -n pocket-id-operator-system
          kubectl get pocketidusergroup test-group -n pocket-id-operator-system

      - name: Package instance chart
        run: |
          mkdir -p charts/pocket-id-instance-packages
          helm package charts/pocket-id-instance \
            --version "0.0.0" \
            --app-version "0.0.0" \
            --destination charts/pocket-id-instance-packages

      - name: Install instance chart
        run: |
          helm install test-instance charts/pocket-id-instance-packages/*.tgz \
            --create-namespace \
            --namespace pocket-id-instance-test \
            --values .github/helm-test-values-instance.yaml \
            --set "instance.spec.appUrl=http://pocket-id-instance.pocket-id-instance-test.svc.cluster.local:1411" \
            --wait \
            --timeout 2m

      - name: Verify instance chart reconciles
        run: |
          echo "=== Custom resources created by the instance chart ==="
          kubectl get pocketidinstance pocket-id-instance -n pocket-id-instance-test
          kubectl get pocketiduser test-user-1 test-user-2 -n pocket-id-instance-test
          kubectl get pocketidusergroup test-group -n pocket-id-instance-test
          kubectl get pocketidoidcclient test-client -n pocket-id-instance-test
          echo "=== Waiting for the operator to reconcile the instance to Ready ==="
          kubectl wait --for=condition=Ready pocketidinstance/pocket-id-instance \
            -n pocket-id-instance-test --timeout=5m

      - name: Debug instance chart on failure
        if: failure()
        run: |
          echo "=== Instance-chart namespace ==="
          kubectl get all -n pocket-id-instance-test || true
          echo "=== PocketID custom resources ==="
          kubectl get pocketidinstance,pocketiduser,pocketidusergroup,pocketidoidcclient \
            -n pocket-id-instance-test -o yaml || true
          echo "=== Pocket-ID pod logs ==="
          kubectl logs -n pocket-id-instance-test -l app.kubernetes.io/name=pocket-id --tail=100 || true

      - name: Uninstall instance chart
        if: always()
        run: |
          helm uninstall test-instance --namespace pocket-id-instance-test || true

      - name: Uninstall test chart
        if: always()
        run: |
          helm uninstall test-release --namespace pocket-id-operator-system || true
