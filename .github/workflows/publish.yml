name: Publish

on:
  workflow_call:
    inputs:
      image_repo:
        description: Image repository (e.g., ghcr.io/owner/pocket-id-operator).
        required: true
        type: string
      build_tag:
        description: Source image tag to retag from.
        required: true
        type: string
      image_tag:
        description: Tag to apply to the published image.
        required: true
        type: string
      repo_owner:
        description: Lowercase repo owner for GHCR namespace.
        required: true
        type: string
  workflow_dispatch:
    inputs:
      image_repo:
        description: Image repository (e.g., ghcr.io/owner/pocket-id-operator).
        required: true
        type: string
      build_tag:
        description: Source image tag to retag from.
        required: true
        type: string
      image_tag:
        description: Tag to apply to the published image.
        required: true
        type: string
      repo_owner:
        description: Lowercase repo owner for GHCR namespace.
        required: true
        type: string

permissions:
  actions: write
  contents: read
  id-token: write
  packages: write

jobs:
  publish-image:
    name: Publish image tags
    runs-on: ubuntu-latest
    steps:
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag image
        run: |
          docker buildx imagetools create \
            -t ${{ inputs.image_repo }}:${{ inputs.image_tag }} \
            ${{ inputs.image_repo }}:${{ inputs.build_tag }}

      - name: Tag :main rolling image
        if: ${{ endsWith(inputs.image_tag, '-main') }}
        run: |
          docker buildx imagetools create \
            -t ${{ inputs.image_repo }}:main \
            ${{ inputs.image_repo }}:${{ inputs.build_tag }}

  publish-chart:
    name: Publish Helm chart
    uses: ./.github/workflows/publish-chart.yml
    with:
      chart_version: "0.0.0"
      app_version: ${{ inputs.image_tag }}
      repo_owner: ${{ inputs.repo_owner }}
      primary_tag: ${{ inputs.image_tag }}
      additional_tag: ${{ endsWith(inputs.image_tag, '-main') && 'main' || '' }}
    secrets: inherit
