name: E2E Tests

on:
  workflow_call:
    inputs:
      image_repo:
        description: Image repository (e.g., ghcr.io/owner/pocket-id-operator).
        required: false
        type: string
      image_tag:
        description: Image tag to preload for e2e tests.
        required: false
        type: string
      latest_release:
        description: Run e2e tests against the latest release instead of current code.
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      image_repo:
        description: Image repository (e.g., ghcr.io/owner/pocket-id-operator).
        required: false
        type: string
      image_tag:
        description: Image tag to preload for e2e tests.
        required: false
        type: string
      latest_release:
        description: Run e2e tests against the latest release instead of current code.
        required: false
        type: boolean
        default: false

permissions:
  actions: write
  contents: read
  packages: read

env:
  # renovate: datasource=github-releases depName=kubernetes-sigs/kind
  KIND_VERSION: v0.31.0
  # renovate: datasource=github-releases depName=kubernetes/kubernetes
  KUBECTL_VERSION: v1.36.0
  # renovate: datasource=github-releases depName=kubernetes-sigs/controller-tools
  CONTROLLER_TOOLS_VERSION: v0.21.0
  # renovate: datasource=github-releases depName=kubernetes-sigs/kustomize
  KUSTOMIZE_VERSION: v5.7.1
  # renovate: datasource=github-releases depName=onsi/ginkgo
  GINKGO_VERSION: v2.28.3
  # renovate: datasource=docker depName=ghcr.io/pocket-id/pocket-id versioning=docker
  POCKET_ID_IMAGE: ghcr.io/pocket-id/pocket-id:v2.7.0-distroless@sha256:ba71ff2988ba42d527784ccfc7530b356ec3f931e600a195de48f2962e2ce1ba

jobs:
  test-e2e:
    name: Run e2e tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Resolve latest release
        if: inputs.latest_release
        id: release
        uses: ./.github/actions/latest-release
        with:
          token: ${{ github.token }}

      - name: Checkout latest release tag
        if: inputs.latest_release
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.release.outputs.tag }}
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Cache tool binaries
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: bin
          key: tools-${{ runner.os }}-go-${{ hashFiles('go.mod') }}-kustomize-${{ env.KUSTOMIZE_VERSION }}-controller-gen-${{ env.CONTROLLER_TOOLS_VERSION }}-ginkgo-${{ env.GINKGO_VERSION }}

      - name: Setup kind
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          version: ${{ env.KIND_VERSION }}
          kubectl_version: ${{ env.KUBECTL_VERSION }}
          install_only: true

      - name: Download image artifact
        if: inputs.image_tag != '' && !inputs.latest_release
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: operator-image-${{ inputs.image_tag }}
          path: /tmp

      - name: Load and retag image
        if: inputs.image_tag != '' && !inputs.latest_release
        env:
          IMAGE_REPO: ${{ inputs.image_repo }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          docker load -i "/tmp/operator-image-${IMAGE_TAG}.tar"
          docker tag "${IMAGE_REPO}:${IMAGE_TAG}" pocket-id-operator:local-test

      - name: Pull release image
        if: inputs.latest_release
        env:
          RELEASE_IMAGE: ${{ steps.release.outputs.image }}
        run: docker pull "${RELEASE_IMAGE}"

      - name: Create kind cluster
        run: make setup-test-e2e

      - name: Run e2e tests
        env:
          SKIP_CLEANUP: "true"
          LATEST_RELEASE: ${{ inputs.latest_release }}
          RELEASE_IMAGE: ${{ steps.release.outputs.image }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          if [ "${LATEST_RELEASE}" = "true" ]; then
            make test-e2e-only IMG="${RELEASE_IMAGE}"
          elif [ -n "${IMAGE_TAG}" ]; then
            make test-e2e-only IMG=pocket-id-operator:local-test
          else
            make test-e2e-only
          fi
