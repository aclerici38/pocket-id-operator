name: E2E Tests

on:
  workflow_call:
    inputs:
      image_repo:
        description: Image repository (e.g., ghcr.io/owner/pocket-id-operator).
        required: false
        type: string
      image_tag:
        description: Image tag to preload for e2e tests.
        required: false
        type: string
      pocket_id_image:
        description: Override the pocket-id image tested against (default is the pinned stable image).
        required: false
        type: string
      latest_release:
        description: Run e2e tests against the latest release instead of current code.
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      image_repo:
        description: Image repository (e.g., ghcr.io/owner/pocket-id-operator).
        required: false
        type: string
      image_tag:
        description: Image tag to preload for e2e tests.
        required: false
        type: string
      pocket_id_image:
        description: Override the pocket-id image tested against (default is the pinned stable image).
        required: false
        type: string
      latest_release:
        description: Run e2e tests against the latest release instead of current code.
        required: false
        type: boolean
        default: false

permissions:
  actions: write
  contents: read
  packages: read

env:
  # renovate: datasource=docker depName=ghcr.io/pocket-id/pocket-id versioning=docker
  POCKET_ID_IMAGE: ghcr.io/pocket-id/pocket-id:v2.9.0-distroless@sha256:968866bdb73c67ce7d75baf2b992b9b33db385668822e936625dc5116f372d2c
  # install_args already installed this job's tool subset; don't let `mise run`
  # auto-install the rest of mise.toml on top of it.
  MISE_TASK_RUN_AUTO_INSTALL: "false"

jobs:
  test-e2e:
    name: Run e2e tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Resolve latest release
        if: inputs.latest_release
        id: release
        uses: ./.github/actions/latest-release
        with:
          token: ${{ github.token }}

      - name: Checkout latest release tag
        if: inputs.latest_release
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.release.outputs.tag }}
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          # renovate: datasource=github-releases depName=jdx/mise
          version: "2026.6.14"
          install_args: "kind kubectl kustomize go:sigs.k8s.io/controller-tools/cmd/controller-gen go:github.com/onsi/ginkgo/v2/ginkgo"

      - name: Download image artifact
        if: inputs.image_tag != '' && !inputs.latest_release
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: operator-image-${{ inputs.image_tag }}
          path: /tmp

      - name: Load and retag image
        if: inputs.image_tag != '' && !inputs.latest_release
        env:
          IMAGE_REPO: ${{ inputs.image_repo }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          docker load -i "/tmp/operator-image-${IMAGE_TAG}.tar"
          docker tag "${IMAGE_REPO}:${IMAGE_TAG}" pocket-id-operator:local-test

      - name: Pull release image
        if: inputs.latest_release
        env:
          RELEASE_IMAGE: ${{ steps.release.outputs.image }}
        run: docker pull "${RELEASE_IMAGE}"

      - name: Create kind cluster
        run: mise run setup-test-e2e

      - name: Run e2e tests
        env:
          SKIP_CLEANUP: "true"
          LATEST_RELEASE: ${{ inputs.latest_release }}
          RELEASE_IMAGE: ${{ steps.release.outputs.image }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          POCKET_ID_IMAGE: ${{ inputs.pocket_id_image || env.POCKET_ID_IMAGE }}
        run: |
          if [ "${LATEST_RELEASE}" = "true" ]; then
            IMG="${RELEASE_IMAGE}" mise run test-e2e-only
          elif [ -n "${IMAGE_TAG}" ]; then
            IMG=pocket-id-operator:local-test mise run test-e2e-only
          else
            mise run test-e2e-only
          fi
