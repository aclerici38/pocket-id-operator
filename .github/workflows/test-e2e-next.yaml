name: E2E Tests (pocket-id next)

# Compatibility canary: hourly, resolves upstream pocket-id's rolling
# `next-distroless` digest and — only when it has changed since the last tested
# run — runs the e2e suite with the published `main` operator against it.
# Results and a per-hour liveness heartbeat land on a locked dashboard issue.

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
    inputs:
      force:
        description: Run the e2e suite even if the digest is unchanged.
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: e2e-next
  cancel-in-progress: false

env:
  CANARY_LABEL: pocket-id-next-canary
  CANARY_ASSIGNEE: aclerici38
  OPERATOR_IMAGE: ghcr.io/aclerici38/pocket-id-operator:main
  MISE_TASK_RUN_AUTO_INSTALL: "false"

jobs:
  resolve:
    name: Resolve next-distroless digest
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      image: ${{ steps.check.outputs.image }}
      digest: ${{ steps.check.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Resolve digest and compare
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          FORCE: ${{ github.event.inputs.force }}
        run: |
          set -euo pipefail
          REF=ghcr.io/pocket-id/pocket-id:next-distroless

          # --format '{{.Digest}}' yields the multi-arch index digest (what an
          # `@sha256:` pin references) regardless of which instance is selected;
          # the platform overrides just keep the lookup off the runner's own arch.
          DIGEST="$(skopeo inspect --retry-times 3 --no-tags \
            --override-os linux --override-arch amd64 \
            --format '{{.Digest}}' "docker://${REF}")"
          test -n "$DIGEST"

          NUM="$(gh issue list --label "$CANARY_LABEL" --state all --limit 1 --json number -q '.[0].number // empty' || true)"
          LAST=""
          if [ -n "$NUM" ]; then
            LAST="$(gh issue view "$NUM" --json body -q .body \
              | grep -oE 'state:tested-digest=sha256:[a-f0-9]+' | head -1 | cut -d= -f2- || true)"
          fi

          if [ "${FORCE:-false}" = "true" ]; then
            CHANGED=true;  REASON="forced via workflow_dispatch"
          elif [ -z "$LAST" ]; then
            CHANGED=true;  REASON="no previously tested digest on record"
          elif [ "$DIGEST" != "$LAST" ]; then
            CHANGED=true;  REASON="digest changed since last tested run"
          else
            CHANGED=false; REASON="digest unchanged since last tested run"
          fi

          {
            echo "digest=${DIGEST}"
            echo "image=${REF}@${DIGEST}"
            echo "changed=${CHANGED}"
          } >>"$GITHUB_OUTPUT"

          {
            echo "### pocket-id \`next\` digest check"
            echo "|            |                 |"
            echo "| ---------- | --------------- |"
            echo "| resolved    | \`${DIGEST}\` |"
            echo "| last tested | \`${LAST:-none}\` |"
            echo "| decision    | **${CHANGED}** — ${REASON} |"
          } >>"$GITHUB_STEP_SUMMARY"

          echo "::notice title=next-distroless digest check::changed=${CHANGED} (${REASON}) resolved=${DIGEST} last=${LAST:-none}"

      - name: Heartbeat dashboard issue
        if: steps.check.outputs.changed == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: CHECKED_AT_NEW="$(date -u +%Y-%m-%dT%H:%M:%SZ)" ./.github/scripts/update-next-canary-issue.sh

  test-e2e-next:
    name: Run e2e tests (pocket-id next)
    needs: resolve
    if: needs.resolve.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      issues: write
    env:
      POCKET_ID_IMAGE: ${{ needs.resolve.outputs.image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          # renovate: datasource=github-releases depName=jdx/mise
          version: "2026.7.5"
          install_args: "kind kubectl kustomize go:sigs.k8s.io/controller-tools/cmd/controller-gen go:github.com/onsi/ginkgo/v2/ginkgo"

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull operator main image
        run: docker pull "${OPERATOR_IMAGE}"

      - name: Create kind cluster
        run: mise run setup-test-e2e

      - name: Run e2e tests
        id: e2e
        env:
          SKIP_CLEANUP: "true"
          IMG: ${{ env.OPERATOR_IMAGE }}
        run: mise run test-e2e-only

      - name: Update canary dashboard issue
        if: ${{ !cancelled() }}
        env:
          GH_TOKEN: ${{ github.token }}
          E2E_OUTCOME: ${{ steps.e2e.outcome }}
          TESTED_DIGEST_NEW: ${{ needs.resolve.outputs.digest }}
          TESTED_RUN_NEW: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ "${E2E_OUTCOME}" = "success" ]; then
            export STATUS_NEW=passing
          else
            export STATUS_NEW=failing
          fi
          NOW="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          TESTED_AT_NEW="$NOW" CHECKED_AT_NEW="$NOW" ./.github/scripts/update-next-canary-issue.sh
