name: Regenerate Manifests

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
  workflow_call:
  workflow_dispatch:

concurrency:
  group: regenerate-manifests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # install_args installs this job's tool subset; don't let `mise run`
  # auto-install the rest of mise.toml on top of it.
  MISE_TASK_RUN_AUTO_INSTALL: "false"

jobs:
  regenerate:
    name: Regenerate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          # renovate: datasource=github-releases depName=jdx/mise
          version: "2026.5.16"
          install_args: "go:sigs.k8s.io/controller-tools/cmd/controller-gen kustomize aqua:sholdee/crd-schema-publisher"

      - name: Verify generated files are up to date
        run: |
          mise run regen
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Generated files are out of date. Run 'mise run regen' locally and commit the result."
            git --no-pager diff
            exit 1
          fi
