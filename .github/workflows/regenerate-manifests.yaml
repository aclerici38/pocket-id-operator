name: Regenerate Manifests

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
  workflow_call:
  workflow_dispatch:

concurrency:
  group: regenerate-manifests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # install_args installs this job's tool subset; don't let `mise run`
  # auto-install the rest of mise.toml on top of it.
  MISE_TASK_RUN_AUTO_INSTALL: "false"

jobs:
  regenerate:
    name: Regenerate
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_KEY }}
          permission-contents: write

      - name: Checkout code from same repo
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref || github.ref }}
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Checkout code from fork
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          # renovate: datasource=github-releases depName=jdx/mise
          version: "2026.5.18"
          install_args: "go:sigs.k8s.io/controller-tools/cmd/controller-gen kustomize aqua:sholdee/crd-schema-publisher"

      - name: Regenerate manifests
        run: |
          mise run regen

      - name: Commit changes
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        env:
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "200541989+${APP_SLUG}[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "chore: regenerate manifests"
            git push "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" "HEAD:${BRANCH}"
            echo "::error::Manifests were out of date and have been regenerated. Failing to prevent duplicate CI runs."
            exit 1
          fi

      - name: Check for uncommitted changes
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        id: check-diff
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_diff=true" >> "$GITHUB_OUTPUT"
            echo "::error::Generated files are out of date. Please run 'mise run regen' and commit the changes."
          fi

      - name: Fail if diff exists
        if: steps.check-diff.outputs.has_diff == 'true'
        run: exit 1