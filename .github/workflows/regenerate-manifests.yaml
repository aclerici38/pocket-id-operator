name: Regenerate Manifests

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
  workflow_call:
  workflow_dispatch:

concurrency:
  group: regenerate-manifests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  # renovate: datasource=github-releases depName=kubernetes-sigs/controller-tools
  CONTROLLER_TOOLS_VERSION: v0.20.1
  # renovate: datasource=github-releases depName=kubernetes-sigs/kustomize
  KUSTOMIZE_VERSION: v5.7.1

jobs:
  regenerate:
    name: Regenerate
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_KEY }}

      - name: Checkout code from same repo
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref || github.ref }}
          token: ${{ steps.app-token.outputs.token || github.token }}
          persist-credentials: false

      - name: Checkout code from fork
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Cache tool binaries
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: bin
          key: tools-${{ runner.os }}-go-${{ hashFiles('go.mod') }}-controller-gen-${{ env.CONTROLLER_TOOLS_VERSION }}-kustomize-${{ env.KUSTOMIZE_VERSION }}

      - name: Setup uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.8"
          ignore-nothing-to-cache: true

      - name: Regenerate manifests
        run: make build-installer generate-schemas fmt vet

      - name: Commit changes
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        env:
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "200541989+${APP_SLUG}[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "chore: regenerate manifests"
            git push "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" "HEAD:${BRANCH}"
            echo "::error::Manifests were out of date and have been regenerated. Failing to prevent duplicate CI runs."
            exit 1
          fi

      - name: Check for uncommitted changes
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        id: check-diff
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_diff=true" >> "$GITHUB_OUTPUT"
            echo "::error::Generated files are out of date. Please run 'make manifests generate fmt build-installer generate-schemas' and commit the changes."
          fi

      - name: Generate diff artifact
        if: steps.check-diff.outputs.has_diff == 'true'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "${PR_NUMBER}" > /tmp/pr-number.txt
          cat > /tmp/schema-diff.md << 'HEADER'
          ## Generated files are out of date

          The following files need to be regenerated. Please run:
          ```sh
          make manifests generate fmt build-installer generate-schemas
          ```
          and commit the changes.

          <details>
          <summary>Diff</summary>

          ```diff
          HEADER
          git diff >> /tmp/schema-diff.md
          cat >> /tmp/schema-diff.md << 'FOOTER'
          ```

          </details>
          FOOTER

      - name: Upload diff artifact
        if: steps.check-diff.outputs.has_diff == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: schema-diff
          path: |
            /tmp/pr-number.txt
            /tmp/schema-diff.md
          retention-days: 1

      - name: Fail if diff exists
        if: steps.check-diff.outputs.has_diff == 'true'
        run: exit 1
