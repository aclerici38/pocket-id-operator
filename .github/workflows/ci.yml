name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
  workflow_dispatch:

permissions:
  actions: write
  attestations: write
  contents: write
  id-token: write
  packages: write

jobs:
  meta:
    name: Metadata
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      repo_owner: ${{ steps.meta.outputs.repo_owner }}
      image_repo: ${{ steps.meta.outputs.image_repo }}
      build_tag: ${{ steps.meta.outputs.build_tag }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set metadata
        id: meta
        run: |
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          SHORT_SHA=$(git rev-parse --short HEAD)
          BUILD_TAG="ci-${SHORT_SHA}"
          IMAGE_TAG="${SHORT_SHA}-main"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BUILD_TAG="PR-${{ github.event.pull_request.number }}"
            IMAGE_TAG="${BUILD_TAG}"
          fi
          echo "repo_owner=${REPO_OWNER}" >> "$GITHUB_OUTPUT"
          echo "image_repo=ghcr.io/${REPO_OWNER}/pocket-id-operator" >> "$GITHUB_OUTPUT"
          echo "build_tag=${BUILD_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

  generate:
    name: Generate
    permissions:
      contents: write
    uses: ./.github/workflows/regenerate-manifests.yml
    secrets: inherit

  test:
    name: Tests
    needs: [generate]
    permissions:
      actions: write
      contents: read
    uses: ./.github/workflows/test.yml
    secrets: inherit

  lint:
    name: Lint
    needs: [generate]
    permissions:
      actions: write
      contents: read
    uses: ./.github/workflows/lint.yml
    secrets: inherit

  build:
    name: Build Image
    needs: [meta, generate]
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    permissions:
      actions: write
      attestations: write
      contents: write
      id-token: write
      packages: write
    uses: ./.github/workflows/build-push-image.yml
    with:
      image_repo: ${{ needs.meta.outputs.image_repo }}
      image_tag: ${{ needs.meta.outputs.build_tag }}
    secrets: inherit

  e2e:
    name: E2E Tests
    needs:
      - meta
      - build
    permissions:
      actions: write
      contents: read
      packages: read
    uses: ./.github/workflows/test-e2e.yml
    with:
      image_repo: ${{ needs.meta.outputs.image_repo }}
      image_tag: ${{ needs.meta.outputs.build_tag }}
    secrets: inherit

  e2e-latest-release:
    name: E2E Tests (Latest Release)
    needs: [generate]
    if: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'pocket-id-upgrade') }}
    permissions:
      actions: write
      contents: read
      packages: read
    uses: ./.github/workflows/test-e2e.yml
    with:
      latest_release: true
    secrets: inherit

  test-chart:
    name: Test Chart
    needs:
      - meta
      - build
    permissions:
      actions: write
      contents: read
      packages: read
    uses: ./.github/workflows/test-chart.yml
    with:
      image_repo: ${{ needs.meta.outputs.image_repo }}
      image_tag: ${{ needs.meta.outputs.build_tag }}
    secrets: inherit

  publish:
    name: Publish
    needs:
      - meta
      - generate
      - e2e
      - test
      - lint
      - build
      - test-chart
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    permissions:
      actions: write
      contents: read
      id-token: write
      packages: write
    uses: ./.github/workflows/publish.yml
    with:
      image_repo: ${{ needs.meta.outputs.image_repo }}
      build_tag: ${{ needs.meta.outputs.build_tag }}
      image_tag: ${{ needs.meta.outputs.image_tag }}
      repo_owner: ${{ needs.meta.outputs.repo_owner }}
    secrets: inherit
